<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadborn Sign Up</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090f;
      --card: #111521;
      --text: #eef3ff;
      --muted: #99a4bf;
      --accent: #6da8ff;
      --danger: #ff7d7d;
      --border: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a2440, var(--bg) 52%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin-bottom: 8px; font-size: 0.92rem; color: var(--muted); }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      margin-bottom: 14px;
      background: #0a0f1c;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--accent);
      color: #071427;
      cursor: pointer;
    }
    .avatar-preview {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #0a0f1c;
      margin: 6px 0 14px;
    }
    .status { min-height: 22px; margin-top: 14px; font-size: 0.92rem; color: var(--muted); }
    .status.error { color: var(--danger); }
    .status.ok { color: #89e79e; }
    .back { margin-top: 16px; text-align: center; }
    .back a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sign Up</h1>
    <p>Create your Threadborn account and avatar.</p>
    <form id="signup-form">
      <label for="displayName">Display name</label>
      <input id="displayName" name="displayName" required maxlength="40" />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="new-password" minlength="6" />
      <label for="avatar">Profile picture</label>
      <input id="avatar" name="avatar" type="file" accept="image/*" />
      <img id="avatar-preview" class="avatar-preview" alt="Avatar preview" />
      <button id="submit-btn" type="submit">Create Account</button>
    </form>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="back">
      <a href="./login.html">Have an account? Login</a> ·
      <a href="./index.html">Back to Reader</a>
    </div>
  </main>
  <script>
    const LOCAL_USERS_KEY = "threadborn_local_users";
    const ACTIVE_USER_KEY = "threadborn_user";
    const form = document.getElementById("signup-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const avatarInput = document.getElementById("avatar");
    const avatarPreview = document.getElementById("avatar-preview");
    let avatarDataUrl = "";

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function readLocalUsers() {
      try {
        return JSON.parse(localStorage.getItem(LOCAL_USERS_KEY) || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveLocalUsers(users) {
      localStorage.setItem(LOCAL_USERS_KEY, JSON.stringify(users));
    }

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files && avatarInput.files[0];
      if (!file) {
        avatarDataUrl = "";
        avatarPreview.removeAttribute("src");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        avatarDataUrl = String(reader.result || "");
        avatarPreview.src = avatarDataUrl;
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      setStatus("");
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      const payload = {
        displayName: form.displayName.value.trim(),
        email: form.email.value.trim().toLowerCase(),
        password: form.password.value,
        avatarDataUrl
      };

      try {
        const response = await fetch("/api/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (response.ok) {
          localStorage.setItem(ACTIVE_USER_KEY, JSON.stringify(result.user));
          setStatus("Account created. Redirecting...", "ok");
          setTimeout(() => { window.location.href = "./index.html"; }, 700);
          return;
        }

        if (result.error && result.error.includes("Missing DATABASE_URL")) {
          const users = readLocalUsers();
          if (users.some(user => user.email === payload.email)) {
            setStatus("This email already exists on this device.", "error");
            return;
          }
          const localUser = {
            id: "local-" + Date.now(),
            email: payload.email,
            password: payload.password,
            displayName: payload.displayName,
            avatarUrl: payload.avatarDataUrl || ""
          };
          users.push(localUser);
          saveLocalUsers(users);
          localStorage.setItem(ACTIVE_USER_KEY, JSON.stringify(localUser));
          setStatus("Created locally because server DB is not configured yet. Redirecting...", "ok");
          setTimeout(() => { window.location.href = "./index.html"; }, 900);
          return;
        }

        setStatus(result.error || "Signup failed.", "error");
      } catch (error) {
        const users = readLocalUsers();
        if (users.some(user => user.email === payload.email)) {
          setStatus("This email already exists on this device.", "error");
          return;
        }
        const localUser = {
          id: "local-" + Date.now(),
          email: payload.email,
          password: payload.password,
          displayName: payload.displayName,
          avatarUrl: payload.avatarDataUrl || ""
        };
        users.push(localUser);
        saveLocalUsers(users);
        localStorage.setItem(ACTIVE_USER_KEY, JSON.stringify(localUser));
        setStatus("Created in offline mode. Redirecting...", "ok");
        setTimeout(() => { window.location.href = "./index.html"; }, 900);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
