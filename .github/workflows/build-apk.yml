name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: apk-build-main
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync website into Android assets
        run: |
          chmod +x scripts/sync_android_site.sh
          bash scripts/sync_android_site.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        working-directory: ./android-app
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PAPI_BASE_URL="${{ secrets.API_BASE_URL }}"

      - name: Prepare APK asset
        run: cp android-app/app/build/outputs/apk/release/app-release.apk Threadborn.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Threadborn.apk
          path: Threadborn.apk

      - name: Upload APK as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-apk"
          name: "Threadborn Latest APK"
          body: "Auto-built Android APK from commit ${{ github.sha }}"
          files: Threadborn.apk
          make_latest: true
