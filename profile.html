<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadborn Profile</title>
  <style>
    :root { color-scheme: dark; --bg:#07090f; --card:#111521; --text:#eef3ff; --muted:#99a4bf; --accent:#6da8ff; --border:rgba(255,255,255,.14); }
    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin:0; background:radial-gradient(circle at top, #1a2440, var(--bg) 52%); color:var(--text); padding:24px; }
    .shell { max-width: 920px; margin: 0 auto; display:grid; gap:14px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; }
    .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .avatar { width:84px; height:84px; border-radius:50%; object-fit:cover; border:1px solid var(--border); }
    input, textarea, button, select { width:100%; border-radius:10px; border:1px solid var(--border); background:#0a0f1c; color:var(--text); padding:10px 12px; }
    button { background:var(--accent); color:#081427; font-weight:700; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
    .muted { color:var(--muted); font-size:.93rem; }
    .badge { display:inline-block; font-size:.8rem; padding:4px 8px; border-radius:999px; border:1px solid var(--border); }
    .ok { color:#8ceba1; }
    .preset-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(64px,1fr)); gap:8px; margin-top:10px; }
    .preset-avatar { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid transparent; cursor:pointer; }
    .preset-avatar.active { border-color:var(--accent); }
  </style>
</head>
<body>
  <main class="shell">
    <article class="card">
      <div class="row">
        <img id="avatar" class="avatar" alt="Avatar" src="./assets/threadborn-logo.png" />
        <div>
          <h1 id="name" style="margin:0;">Profile</h1>
          <p id="meta" class="muted" style="margin:6px 0 0;">Loading...</p>
          <span id="verified" class="badge" style="display:none;">Verified</span>
        </div>
      </div>
    </article>

    <article class="card">
      <h2 style="margin-top:0;">Profile Settings</h2>
      <div class="grid">
        <div>
          <label>Username</label>
          <input id="username" maxlength="24" pattern="[A-Za-z0-9_]{3,24}" />
        </div>
        <div>
          <label>Avatar image</label>
          <input id="avatar-file" type="file" accept="image/*" />
          <label style="margin-top:8px;display:block;">Or pick a preset</label>
          <div id="preset-grid" class="preset-grid"></div>
        </div>
      </div>
      <canvas id="crop-canvas" width="320" height="320" style="display:none;margin-top:10px;border-radius:12px;border:1px solid var(--border);max-width:100%;"></canvas>
      <div style="margin-top:8px;">
        <label>Crop zoom</label>
        <input id="crop-zoom" type="range" min="1" max="3" step="0.1" value="1" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="save-profile">Save Profile</button>
        <a href="./index.html" class="muted">Back to reader</a>
      </div>
      <p id="profile-status" class="muted"></p>
    </article>

    <article class="card">
      <h2 style="margin-top:0;">Reading Settings</h2>
      <div class="grid">
        <div>
          <label>Theme</label>
          <select id="setting-theme">
            <option value="night">Night</option>
            <option value="paper">Paper</option>
            <option value="ember">Ember</option>
          </select>
        </div>
        <div>
          <label>Text size</label>
          <input id="setting-size" type="number" min="15" max="24" step="1" />
        </div>
      </div>
      <button id="save-settings" style="margin-top:10px;">Save Settings</button>
      <p id="settings-status" class="muted"></p>
    </article>

    <article class="card">
      <h2 style="margin-top:0;">Bookmarks</h2>
      <div id="bookmarks" class="muted">Loading bookmarks...</div>
    </article>

    <article class="card">
      <h2 style="margin-top:0;">Reading Analytics</h2>
      <div id="analytics" class="muted">Loading analytics...</div>
    </article>
  </main>

  <script>
    const API_BASE = (window.__THREADBORN_API_BASE || localStorage.getItem("threadborn_api_base") || "").replace(/\/$/, "");
    const avatarEl = document.getElementById("avatar");
    const nameEl = document.getElementById("name");
    const metaEl = document.getElementById("meta");
    const verifiedEl = document.getElementById("verified");
    const profileStatus = document.getElementById("profile-status");
    const settingsStatus = document.getElementById("settings-status");
    const canvas = document.getElementById("crop-canvas");
    const ctx = canvas.getContext("2d");
    let csrfToken = "";
    let cropDataUrl = "";
    let latestAvatarUrl = "";
    let loadedImage = null;
    let cropZoom = 1;
    let selectedPreset = "";
    const presetAvatars = [
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-yono",
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-violet",
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-serah",
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-kael",
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-mirika",
      "https://api.dicebear.com/9.x/adventurer/svg?seed=threadborn-fan"
    ];

    async function apiFetch(path, options = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
      if (csrfToken) headers["X-CSRF-Token"] = csrfToken;
      const response = await fetch(`${API_BASE}${path}`, Object.assign({}, options, { credentials: "include", headers }));
      const json = await response.json();
      if (!response.ok || !json.success) throw new Error(json.error || "Request failed");
      return json.data;
    }

    function setMessage(target, message, ok) {
      target.textContent = message;
      target.className = ok ? "muted ok" : "muted";
    }

    function drawCropPreview() {
      if (!loadedImage) return;
      canvas.style.display = "block";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const side = Math.min(loadedImage.width, loadedImage.height) / cropZoom;
      const sx = Math.floor((loadedImage.width - side) / 2);
      const sy = Math.floor((loadedImage.height - side) / 2);
      ctx.drawImage(loadedImage, sx, sy, side, side, 0, 0, canvas.width, canvas.height);
      cropDataUrl = canvas.toDataURL("image/jpeg", 0.92);
      avatarEl.src = cropDataUrl;
    }

    function renderAvatarForCrop(sourceUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        loadedImage = img;
        drawCropPreview();
      };
      img.src = sourceUrl;
    }

    function renderPresetAvatars() {
      const grid = document.getElementById("preset-grid");
      grid.innerHTML = presetAvatars.map(url => `<img class="preset-avatar ${selectedPreset === url ? "active" : ""}" src="${url}" data-url="${url}" alt="Preset avatar" />`).join("");
      grid.querySelectorAll(".preset-avatar").forEach(item => {
        item.addEventListener("click", () => {
          selectedPreset = item.dataset.url || "";
          renderPresetAvatars();
          cropZoom = 1;
          document.getElementById("crop-zoom").value = "1";
          renderAvatarForCrop(selectedPreset);
        });
      });
    }

    document.getElementById("avatar-file").addEventListener("change", event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      selectedPreset = "";
      renderPresetAvatars();
      renderAvatarForCrop(URL.createObjectURL(file));
    });

    document.getElementById("crop-zoom").addEventListener("input", event => {
      cropZoom = Number(event.target.value || 1);
      drawCropPreview();
    });

    document.getElementById("save-profile").addEventListener("click", async () => {
      try {
        let avatarUrl = latestAvatarUrl;
        if (cropDataUrl) {
          const upload = await apiFetch("/api/upload/avatar", {
            method: "POST",
            body: JSON.stringify({ dataUrl: cropDataUrl })
          });
          avatarUrl = upload.url;
        }
        const username = document.getElementById("username").value.trim();
        if (!/^[A-Za-z0-9_]{3,24}$/.test(username)) {
          throw new Error("Username must be 3-24 letters, numbers, or underscores.");
        }
        const profile = await apiFetch("/api/user/profile", {
          method: "PATCH",
          body: JSON.stringify({ username, avatarUrl })
        });
        latestAvatarUrl = profile.user.avatarUrl;
        nameEl.textContent = profile.user.username;
        avatarEl.src = profile.user.avatarUrl || "./assets/threadborn-logo.png";
        localStorage.setItem("threadborn_user", JSON.stringify({
          id: profile.user.id,
          email: profile.user.email,
          displayName: profile.user.username,
          avatarUrl: profile.user.avatarUrl,
          verified: profile.user.verified,
          role: profile.user.role
        }));
        setMessage(profileStatus, "Profile saved.", true);
      } catch (error) {
        setMessage(profileStatus, error.message, false);
      }
    });

    document.getElementById("save-settings").addEventListener("click", async () => {
      const settings = {
        readerTheme: document.getElementById("setting-theme").value,
        readerSize: Number(document.getElementById("setting-size").value || 18)
      };
      try {
        await apiFetch("/api/user/settings", { method: "PUT", body: JSON.stringify({ settings }) });
        localStorage.setItem("threadborn_reader_settings_cache", JSON.stringify(settings));
        setMessage(settingsStatus, "Settings saved.", true);
      } catch (error) {
        setMessage(settingsStatus, error.message, false);
      }
    });

    async function loadProfile() {
      const me = await apiFetch("/api/auth/me");
      csrfToken = me.csrfToken || "";
      const user = me.user;
      latestAvatarUrl = user.avatarUrl || "";
      avatarEl.src = user.avatarUrl || "./assets/threadborn-logo.png";
      nameEl.textContent = user.username;
      metaEl.textContent = `${user.email} • role: ${user.role}`;
      verifiedEl.style.display = user.verified ? "inline-block" : "none";
      document.getElementById("username").value = user.username;
      renderPresetAvatars();

      const profile = await apiFetch("/api/user/profile");
      const posts = Array.isArray(profile.posts) ? profile.posts : [];
      if (posts.length) {
        const lines = posts.map(post => `<div>• ${post.title} (${post.category || "post"})</div>`).join("");
        document.getElementById("analytics").insertAdjacentHTML("beforebegin", `<article class="card"><h2 style="margin-top:0;">User Posts</h2>${lines}</article>`);
      }
    }

    async function loadBookmarks() {
      const data = await apiFetch("/api/reader/bookmarks?novelId=threadborn");
      const bookmarks = data.bookmarks || [];
      if (!bookmarks.length) {
        document.getElementById("bookmarks").textContent = "No bookmarks yet.";
        return;
      }
      document.getElementById("bookmarks").innerHTML = bookmarks.map(item =>
        `<div>• ${item.label || `${item.volume_id} ${item.chapter_id}`} (page ${Math.floor(item.scroll_position) + 1})</div>`
      ).join("");
    }

    async function loadAnalytics() {
      const data = await apiFetch("/api/reader/analytics");
      const rows = data.volumes || [];
      if (!rows.length) {
        document.getElementById("analytics").textContent = "No reading analytics yet.";
        return;
      }
      document.getElementById("analytics").innerHTML = rows.map(row =>
        `<div>• ${row.volume_id}: ${row.total_time}s (last read ${new Date(row.last_read_at).toLocaleString()})</div>`
      ).join("");
    }

    (async () => {
      try {
        await loadProfile();
        try {
          const settings = await apiFetch("/api/user/settings");
          const reader = settings.settings || {};
          document.getElementById("setting-theme").value = reader.readerTheme || "night";
          document.getElementById("setting-size").value = String(reader.readerSize || 18);
        } catch (error) {
          const local = JSON.parse(localStorage.getItem("threadborn_reader_settings_cache") || "{}");
          document.getElementById("setting-theme").value = local.readerTheme || "night";
          document.getElementById("setting-size").value = String(local.readerSize || 18);
        }
        await loadBookmarks();
        await loadAnalytics();
      } catch (error) {
        metaEl.textContent = "Login required.";
        setMessage(profileStatus, "Please login first.", false);
      }
    })();
  </script>
</body>
</html>
